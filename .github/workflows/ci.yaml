name: LawBridge CI

on:
  push:
   branches: [main]
  pull_request:
   branches: [main]

jobs:
  typecheck:
   runs-on: ubuntu-latest

   steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
       node-version: '20'
       cache: 'npm'

    - run: npm ci

    - name: Run type Check
      run: npm run type-check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        
      - run: npm ci
        
      - name: Run linter
        run: npm run lint

  build:
   needs: [typecheck, lint]
   runs-on: ubuntu-latest
   steps:
    - uses: actions/checkout@v4
      
    - uses: actions/setup-node@v4
      with:
       node-version: '20'
       cache: 'npm'

    - run: npm ci 
      
    - name: build
      run: npm run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_PAYSTACK_PUBLIC_KEY }}
       
  python-lint:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v4

     - uses: actions/setup-python@v5
       with: 
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: ml-service/requirements.txt

     - run: pip install ruff
       
     - run: pip install -r ml-service/requirements.txt
       
     - name: Run linter
       run: ruff check ml-service/